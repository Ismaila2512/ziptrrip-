<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow — Premium Productivity</title>
    <meta name="description" content="A premium task management app with Eisenhower Matrix, Zen Mode, and Productivity Analytics." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* ── Minimal inline styles so the splash shows before any JS loads ── */
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Outfit', system-ui, sans-serif;
        background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 50%, #cffafe 100%);
        min-height: 100vh;
      }

      /* Splash overlay */
      #loading-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: transparent;
        transition: opacity 0.7s ease, visibility 0.7s ease;
      }
      
      .splash-video-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        opacity: 0.7;
      }
      
      .splash-video-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(237,233,254,0.6) 0%, rgba(219,234,254,0.6) 50%, rgba(207,250,254,0.6) 100%);
        z-index: -1;
      }

      #loading-splash.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Logo */
      .sp-logo {
        font-family: 'Outfit', sans-serif;
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #7c3aed, #2563eb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        opacity: 0;
        transform: translateY(12px);
        animation: spFadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
      }

      .sp-sub {
        font-size: 0.9rem;
        color: #64748b;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 500;
        margin-bottom: 40px;
        opacity: 0;
        transform: translateY(8px);
        animation: spFadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
      }

      @keyframes spFadeUp {
        to { opacity: 1; transform: translateY(0); }
      }

      /* Ripple rings */
      .sp-rings {
        position: relative;
        width: 64px;
        height: 64px;
        opacity: 0;
        animation: spFadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
      }

      .sp-rings::before,
      .sp-rings::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid #7c3aed;
        animation: spRipple 1.8s cubic-bezier(0, 0.2, 0.8, 1) infinite;
      }

      .sp-rings::after {
        animation-delay: -0.9s;
        border-color: #2563eb;
      }

      @keyframes spRipple {
        0%   { transform: scale(0.4); opacity: 0.9; }
        100% { transform: scale(2);   opacity: 0;   }
      }

      /* Center icon inside rings */
      .sp-icon {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }

      /* Dot wave */
      .sp-dots {
        display: flex;
        gap: 8px;
        margin-top: 36px;
        opacity: 0;
        animation: spFadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.75s forwards;
      }

      .sp-dots span {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        animation: spDot 1.3s ease-in-out infinite;
      }

      .sp-dots span:nth-child(1) { background: #7c3aed; animation-delay: 0s; }
      .sp-dots span:nth-child(2) { background: #3b82f6; animation-delay: 0.16s; }
      .sp-dots span:nth-child(3) { background: #06b6d4; animation-delay: 0.32s; }

      @keyframes spDot {
        0%, 80%, 100% { transform: translateY(0);    opacity: 0.5; }
        40%            { transform: translateY(-14px); opacity: 1;   }
      }

      /* Progress bar at bottom */
      .sp-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: linear-gradient(90deg, #7c3aed, #2563eb, #06b6d4);
        border-radius: 0 2px 2px 0;
        animation: spProgress 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes spProgress {
        0%   { width: 0%; }
        100% { width: 100%; }
      }

      /* Loading tip */
      .sp-tip {
        position: absolute;
        bottom: 32px;
        font-size: 0.78rem;
        color: #94a3b8;
        letter-spacing: 0.05em;
        opacity: 0;
        animation: spFadeUp 0.5s ease 1s forwards;
      }
    </style>
  </head>

  <body>
    <!-- ══════════ LOADING SPLASH ══════════ -->
    <div id="loading-splash" role="status" aria-label="Loading TaskFlow">
      <video class="splash-video-bg" autoPlay loop muted playsInline>
        <source src="/assets/bg1.mp4" type="video/mp4" />
      </video>
      <div class="splash-video-overlay"></div>
      
      <div class="sp-logo">✦ TaskFlow</div>
      <div class="sp-sub">Premium Productivity</div>

      <div class="sp-rings">
        <div class="sp-icon">⚡</div>
      </div>

      <div class="sp-dots">
        <span></span><span></span><span></span>
      </div>

      <div class="sp-progress"></div>
      <div class="sp-tip">Organizing your world…</div>
    </div>
    <!-- ───────────────────────────────────── -->

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
